<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Atendimento - Cura & Cuidado</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body { background-color: #fdf6f0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .agendar-container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .titulo { color: #d4a373; text-align: center; margin-bottom: 20px; }
        
        .grid-horarios { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-horario { 
            padding: 12px; border: 2px solid #e8b4b8; background: white; color: #d69ea2; 
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-align: center; line-height: 1.4;
        }
        .btn-horario.selected { background: #e8b4b8; color: white; border-color: #d69ea2; }
        .btn-horario:disabled { border-color: #eee; color: #ccc; cursor: not-allowed; }

        .btn-confirmar { 
            width: 100%; margin-top: 25px; padding: 15px; background: #25d366; 
            color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-confirmar:hover { background: #1eb954; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="agendar-container">
    <h2 class="titulo">Escolha seu Horário 🌸</h2>
    <p style="text-align: center; font-size: 0.9em; color: #888;">Selecione uma das opções abaixo para realizar seu agendamento.</p>

    <div id="lista-horarios" class="grid-horarios">
        <p style="grid-column: span 2; text-align: center;">Buscando horários disponíveis... ⏳</p>
    </div>

    <button id="btnConfirmar" class="btn-confirmar" style="display: none;" onclick="finalizarAgendamento()">
        Confirmar Agendamento ✨
    </button>
    
    <a href="cliente.html" style="display: block; text-align: center; margin-top: 15px; color: #999; text-decoration: none;">Voltar para minha conta</a>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycby82CaoClGi9FBcYujgVbbDlamubXyxZkrEMs3uYFxtXgjs8qDSUed4XmHjpdKKTlw4/exec";
    let horarioSelecionado = null;

    window.onload = () => {
        if (!localStorage.getItem("usuarioLogado")) {
            window.location.href = "login.html";
            return;
        }
        carregarHorarios();
    };

    async function carregarHorarios() {
    const container = document.getElementById("lista-horarios");
    container.innerHTML = "Buscando horários... ⏳";

    try {
        const resposta = await fetch(`${URL_API}?acao=listarAgendamentos`);
        const dados = await resposta.json();

        // 1. Criamos um conjunto (Set) de todos os horários que já estão OCUPADOS
        const ocupados = new Set(
            dados.filter(item => String(item.Status).trim() === "Ocupado")
                 .map(item => `${item.DataAgenda}|${item.Hour}`)
        );

        // 2. Filtramos apenas os "Disponíveis" que NÃO estão na lista de ocupados
        const disponiveisParaMostrar = dados.filter(item => {
            const chave = `${item.DataAgenda}|${item.Hour}`;
            const estaDisponivel = String(item.Status).trim() === "Disponível";
            return estaDisponivel && !ocupados.has(chave);
        });

        if (disponiveisParaMostrar.length === 0) {
            container.innerHTML = "<p>Nenhum horário disponível no momento. 🌸</p>";
            return;
        }

        let botoesHtml = "";
        disponiveisParaMostrar.forEach(h => {
            const dataBR = h.DataAgenda.includes("T") ? h.DataAgenda.split("T").split("-").reverse().join("/") : h.DataAgenda;
            const horaBR = h.Hour.includes("T") ? h.Hour.split("T").substring(0, 5) : h.Hour;

            botoesHtml += `
                <button type="button" class="btn-horario" onclick="selecionar(this, '${h.DataAgenda}', '${h.Hour}')">
                    ${dataBR}<br><b>${horaBR}</b>
                </button>
            `;
        });

        container.innerHTML = botoesHtml;

    } catch (erro) {
        container.innerHTML = "<p>Erro ao carregar os dados. 🌸</p>";
    }
}

    function selecionar(btn, data, hora) {
        document.querySelectorAll('.btn-horario').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        horarioSelecionado = { data, hora };
        document.getElementById("btnConfirmar").style.display = "block";
    }

    async function finalizarAgendamento() {
        const btn = document.getElementById("btnConfirmar");
        const cliente = localStorage.getItem("usuarioLogado");
        const telefone = localStorage.getItem("tel_cliente") || "Não informado";

        if(!horarioSelecionado) return;

        btn.disabled = true;
        btn.innerText = "Processando... 🌸";

        const payload = {
            acao: "agendar", // Adicionado para seu Script saber o que fazer
            aba: "Agendamentos",
            payload: {
                "DataAgenda": horarioSelecionado.data,
                "Hour": horarioSelecionado.hora,
                "Cliente": cliente,
                "Telefone": telefone,
                "Status": "Ocupado"
            }
        };

        try {
            // No Google Apps Script, o POST precisa ser enviado como texto
            const res = await fetch(URL_API, { 
                method: 'POST', 
                body: JSON.stringify(payload) 
            });
            const r = await res.json();
            
            if (r.status === "sucesso") {
                alert("Agendamento realizado com sucesso! Esperamos por você. ✨");
                window.location.href = "cliente.html";
            } else {
                alert("Erro: " + (r.mensagem || "Erro desconhecido"));
                btn.disabled = false;
                btn.innerText = "Confirmar Agendamento ✨";
            }
        } catch (e) {
            alert("Erro ao conectar com o servidor. Verifique sua internet.");
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento ✨";
        }
    }
</script>
</body>
</html>
