<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Espaço Cura e Cuidado</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body { background-color: #fdf6f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container-cliente { max-width: 600px; margin: 20px auto; padding: 15px; }
        .header-cliente { text-align: center; padding: 20px 0; color: #d4a373; }
        
        /* Menu Rápido */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-btn { background: white; border: none; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; text-align: center; font-family: inherit; }
        .dash-btn i { font-size: 1.5em; display: block; margin-bottom: 5px; font-style: normal; }

        /* Lista de Pedidos/Agenda */
        .pedido-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #d4a373; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .status-badge { float: right; padding: 4px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; }
        .pago { background: #d4edda; color: #155724; }
        .pendente { background: #fff3cd; color: #856404; }
        
        .btn-voltar { display: block; text-align: center; margin-top: 20px; color: #999; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container-cliente">
    <div class="header-cliente">
        <h2 id="nomeUsuario">Olá, bem-vinda! 🌸</h2>
        <p>Acompanhe seus pedidos e agendamentos abaixo.</p>
    </div>

    <div class="dash-grid">
        <button class="dash-btn" onclick="mostrarSecao('pedidos')"><i>📦</i> Meus Pedidos</button>
        <button class="dash-btn" onclick="mostrarSecao('agenda')"><i>📅</i> Minha Agenda</button>
        <button class="dash-btn" onclick="mostrarSecao('dados')" style="grid-column: span 2;"><i>👤</i> Meus Dados de Entrega</button>
    </div>

    <button onclick="window.location.href='agendar.html'" 
            style="width: 100%; margin-bottom: 25px; padding: 15px; background: #e8b4b8; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(232, 180, 184, 0.3); font-family: inherit; font-size: 1em;">
        ✨ Agendar Novo Atendimento
    </button>

    <div id="secao-pedidos">
        <h3 style="color: #555;">Meus Pedidos</h3>
        <div id="lista-pedidos">
            <p style="text-align:center;">Carregando pedidos... ⏳</p>
        </div>
    </div>

    <div id="secao-agenda" style="display: none;">
        <h3 style="color: #555;">Meus Agendamentos 🌸</h3>
        <div id="lista-agendamentos">
            <p style="text-align:center;">Carregando sua agenda... ⏳</p>
        </div>
    </div>

    <div id="secao-dados" style="display: none;">
        <h3 style="color: #555;">Seus Dados de Entrega</h3>
        <div class="form-container" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
            <label style="display:block; margin-bottom:5px;">Endereço completo:</label>
            <input type="text" id="c-end" placeholder="Rua, número, bairro..." style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            
            <label style="display:block; margin-bottom:5px;">WhatsApp:</label>
            <input type="tel" id="c-tel" placeholder="(85) 99156-1497" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            
            <button onclick="salvarLocalmente()" style="width: 100%; padding: 15px; background: #d4a373; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Salvar Alterações</button>
        </div>
    </div>

    <a href="index.html" class="btn-voltar">← Voltar para a loja</a>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyrqHCXtP99cGGH8KvVBLmY_9ElgkTtbK2JgFqecgszbeXCurJobZcrbe6BOy2bpHXm/exec"; 

    window.onload = () => {
        const user = localStorage.getItem("usuarioLogado");
        if (!user) {
            window.location.href = "login.html"; 
            return;
        }
        document.getElementById("nomeUsuario").innerText = `Olá, ${user} 🌸`;
        
        // Carrega dados salvos localmente
        document.getElementById("c-end").value = localStorage.getItem("end_cliente") || "";
        document.getElementById("c-tel").value = localStorage.getItem("tel_cliente") || "";

        // Lógica de abas via URL (?secao=agenda)
        const params = new URLSearchParams(window.location.search);
        const secaoAlvo = params.get('secao');
        
        if (secaoAlvo) {
            mostrarSecao(secaoAlvo);
        } else {
            mostrarSecao('pedidos'); // Padrão
        }

        carregarPedidos(user);
        carregarAgendamentos(user);
    };

    async function carregarPedidos(cliente) {
        const container = document.getElementById("lista-pedidos");
        try {
            const res = await fetch(`${URL_API}?acao=listarVendas`);
            const todosOsDados = await res.json();

            const meusPedidos = todosOsDados.filter(p => 
                p.Cliente && String(p.Cliente).toLowerCase() === String(cliente).toLowerCase()
            );

            if (meusPedidos.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Nenhum pedido encontrado. 🛒</p>";
                return;
            }

            container.innerHTML = meusPedidos.map(p => `
                <div class="pedido-card">
                    <span class="status-badge ${p.Status_Pagamento === 'Pagamento Realizado' ? 'pago' : 'pendente'}">
                        ${p.Status_Pagamento || 'Pendente'}
                    </span>
                    <strong>ID: ${p["ID Pedido"] || '---'}</strong><br>
                    <small>${p.Data}</small>
                    <p><strong>Itens:</strong> ${p.Produto}</p>
                    <p><strong>Valor:</strong> R$ ${p.Valor}</p>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p style='text-align:center; color:red;'>Erro ao carregar pedidos.</p>";
        }
    }

   async function carregarAgendamentos(cliente) {
    const container = document.getElementById("lista-agendamentos");
    try {
        const res = await fetch(`${URL_API}?acao=listarAgendamentos`);
        const dados = await res.json();

        // Filtra apenas o que pertence ao cliente logado e está ocupado
        const minhaAgenda = dados.filter(a => 
            a.Status === "Ocupado" && 
            a.Cliente && String(a.Cliente).toLowerCase() === String(cliente).toLowerCase()
        );

        if (minhaAgenda.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>Você não possui agendamentos. 📅</p>";
            return;
        }

        container.innerHTML = minhaAgenda.map(a => {
            // --- BUSCA NA COLUNA M ---
            // No JSON do Google Apps Script, os campos herdam o nome do cabeçalho.
            // Se a Coluna M na sua planilha se chamar "Data_Final" ou "Vaga", use esse nome.
            // Abaixo, tentamos capturar o valor da data que foi salva no momento do clique.
            
            let dataBruta = a.DataAgenda || a.Data || ""; 
            
            // Ajuste de Data (Coluna M)
            let dataExibicao = "Data não encontrada";
            if (dataBruta) {
                let apenasData = String(dataBruta).split('T')[0].split(' ')[0];
                dataExibicao = apenasData.includes("-") 
                    ? apenasData.split('-').reverse().join('/') 
                    : apenasData;
            }

            // Ajuste de Hora (Coluna H)
            let horaBruta = String(a.Hour || a.Hora || "");
            let horaExibicao = "--:--";
            if (horaBruta) {
                horaExibicao = horaBruta.includes(" ") 
                    ? horaBruta.split(" ")[1].substring(0, 5) 
                    : horaBruta.substring(0, 5);
            }

            return `
                <div class="pedido-card" style="border-left-color: #e8b4b8;">
                    <span class="status-badge pago">Confirmado</span>
                    <strong>📅 ${dataExibicao} às ${horaExibicao}</strong><br>
                    <p style="margin-top:10px;"><strong>Serviço:</strong> Atendimento Especializado</p>
                    <p><strong>Profissional:</strong> ${a.Profissional || 'Equipe Cura e Cuidado'}</p>
                    <small style="color: #999;">ID do Agendamento: ${a.ID}</small>
                </div>
            `;
        }).join('');
    } catch (e) {
        console.error("Erro ao carregar Coluna M:", e);
        container.innerHTML = "<p style='text-align:center; color:red;'>Erro ao carregar agenda.</p>";
    }
}

    function mostrarSecao(secao) {
        document.getElementById("secao-pedidos").style.display = secao === 'pedidos' ? 'block' : 'none';
        document.getElementById("secao-agenda").style.display = secao === 'agenda' ? 'block' : 'none';
        document.getElementById("secao-dados").style.display = secao === 'dados' ? 'block' : 'none';
    }

    function salvarLocalmente() {
        localStorage.setItem("end_cliente", document.getElementById("c-end").value);
        localStorage.setItem("tel_cliente", document.getElementById("c-tel").value);
        alert("Dados salvos com sucesso! ✨");
    }
</script>

</body>
</html>
