<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Espaço Cura e Cuidado</title>
    <style>
        body { background-color: #fdf6f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; color: #444; }
        .container-cliente { max-width: 600px; margin: 20px auto; padding: 15px; }
        .header-cliente { text-align: center; padding: 20px 0; color: #d4a373; }
        
        /* Menu Rápido */
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-btn { background: white; border: none; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; text-align: center; font-family: inherit; font-weight: 600; color: #7a5c44; transition: transform 0.2s; }
        .dash-btn:active { transform: scale(0.95); }
        .dash-btn i { font-size: 1.5em; display: block; margin-bottom: 5px; font-style: normal; }

        /* Cards */
        .pedido-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #d4a373; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status-badge { float: right; padding: 4px 10px; border-radius: 15px; font-size: 0.8em; font-weight: bold; }
        .pago { background: #d4edda; color: #155724; }
        .pendente { background: #fff3cd; color: #856404; }
        
        /* Formulário */
        .form-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { display: block; margin-bottom: 6px; font-size: 0.9em; font-weight: 600; color: #888; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        .btn-principal { width: 100%; padding: 15px; background: #e8b4b8; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(232, 180, 184, 0.3); font-size: 1em; }
        .btn-salvar { background: #d4a373; margin-top: 10px; }
        .btn-voltar { display: block; text-align: center; margin-top: 25px; color: #999; text-decoration: none; font-size: 0.9em; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container-cliente">
    <div class="header-cliente">
        <h2 id="nomeUsuario">Olá, bem-vinda! 🌸</h2>
        <p>Gerencie seus atendimentos e dados abaixo.</p>
    </div>

    <div class="dash-grid">
        <button class="dash-btn" onclick="mostrarSecao('pedidos')"><i>📦</i> Pedidos</button>
        <button class="dash-btn" onclick="mostrarSecao('agenda')"><i>📅</i> Agenda</button>
        <button class="dash-btn" onclick="mostrarSecao('dados')" style="grid-column: span 2;"><i>👤</i> Dados de Entrega</button>
    </div>

    <button onclick="window.location.href='agendar.html'" class="btn-principal">
        ✨ Agendar Novo Atendimento
    </button>

    <div id="secao-pedidos">
        <h3 style="color: #555; margin-top: 25px;">Meus Pedidos</h3>
        <div id="lista-pedidos"><p style="text-align:center;">⏳</p></div>
    </div>

    <div id="secao-agenda" style="display: none;">
        <h3 style="color: #555; margin-top: 25px;">Meus Agendamentos 🌸</h3>
        <div id="lista-agendamentos"><p style="text-align:center;">⏳</p></div>
    </div>

    <div id="secao-dados" style="display: none;">
        <h3 style="color: #555; margin-top: 25px;">Dados de Entrega</h3>
        <div class="form-container">
            <label for="c-tel">WhatsApp (com DDD):</label>
            <input type="tel" id="c-tel" placeholder="Ex: 85999999999">

            <label for="c-end">Endereço Completo:</label>
            <input type="text" id="c-end" placeholder="Rua, número, bairro...">

            <button onclick="salvarDadosCliente()" id="btnSalvar" class="btn-principal btn-salvar">
                💾 Salvar Alterações
            </button>
        </div>
    </div>

    <a href="index.html" class="btn-voltar">← Voltar para a loja</a>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyrqHCXtP99cGGH8KvVBLmY_9ElgkTtbK2JgFqecgszbeXCurJobZcrbe6BOy2bpHXm/exec";

    window.onload = () => {
        const user = localStorage.getItem("usuarioLogado");
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        document.getElementById("nomeUsuario").innerText = `Olá, ${user} 🌸`;
        
        // Preenche campos com o que estiver no LocalStorage
        document.getElementById("c-end").value = localStorage.getItem("end_cliente") || "";
        document.getElementById("c-tel").value = localStorage.getItem("tel_cliente") || "";

        carregarPedidos(user);
        carregarAgendamentos(user);
    };

    function mostrarSecao(secao) {
        const secoes = ['pedidos', 'agenda', 'dados'];
        secoes.forEach(s => {
            document.getElementById(`secao-${s}`).style.display = (s === secao) ? 'block' : 'none';
        });
    }

    async function salvarDadosCliente() {
        const endereco = document.getElementById("c-end").value;
        const telefone = document.getElementById("c-tel").value;
        const usuarioLogado = localStorage.getItem("usuarioLogado");
        const btn = document.getElementById("btnSalvar");

        if(!telefone) return alert("Por favor, informe seu WhatsApp.");

        try {
            btn.innerText = "Salvando na Planilha... ⏳";
            btn.disabled = true;

            // De acordo com o seu código .gs, precisamos desse formato exato:
            const dadosParaEnviar = {
                acao: "executarPlanilha",
                subAcao: "salvar",
                aba: "Usuarios",
                id: usuarioLogado, // O script vai procurar esse ID na Coluna 1
                payload: {
                    "14": telefone, // Whats_App (Coluna N)
                    "15": endereco  // Endereço (Coluna O)
                }
            };

            const res = await fetch(URL_API, {
                method: 'POST',
                body: JSON.stringify(dadosParaEnviar)
            });

            const r = await res.json();
            
            if (r.status === "sucesso") {
                // Se deu certo na planilha, atualiza o LocalStorage também
                localStorage.setItem("end_cliente", endereco);
                localStorage.setItem("tel_cliente", telefone);
                alert("Dados sincronizados com sucesso! ✨");
            } else {
                throw new Error(r.log || "Erro desconhecido");
            }

        } catch (e) {
            console.error(e);
            alert("Erro ao conectar. Os dados foram salvos apenas neste aparelho.");
            localStorage.setItem("end_cliente", endereco);
            localStorage.setItem("tel_cliente", telefone);
        } finally {
            btn.innerText = "💾 Salvar Alterações";
            btn.disabled = false;
        }
    }

    // --- FUNÇÕES DE CARREGAMENTO (PEDIDOS E AGENDA) ---
    async function carregarPedidos(cliente) {
        const container = document.getElementById("lista-pedidos");
        try {
            const res = await fetch(`${URL_API}?acao=listarVendas`);
            const dados = await res.json();
            const meus = dados.filter(p => String(p.Cliente).toLowerCase() === cliente.toLowerCase());
            
            if (meus.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Nenhum pedido encontrado. 🛒</p>";
                return;
            }

            container.innerHTML = meus.map(p => `
                <div class="pedido-card">
                    <span class="status-badge ${p.Status_Pagamento === 'Pagamento Realizado' ? 'pago' : 'pendente'}">
                        ${p.Status_Pagamento || 'Pendente'}
                    </span>
                    <strong>ID: ${p["ID Pedido"] || '---'}</strong><br>
                    <small>${p.Data}</small>
                    <p><strong>Itens:</strong> ${p.Produto}</p>
                    <p><strong>Valor:</strong> R$ ${p.Valor}</p>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = "Erro ao carregar."; }
    }

    async function carregarAgendamentos(cliente) {
        const container = document.getElementById("lista-agendamentos");
        try {
            const res = await fetch(`${URL_API}?acao=listarAgendamentos&t=${Date.now()}`);
            const dados = await res.json();
            const meus = dados.filter(a => 
                (String(a.Status).toLowerCase() === "ocupado") && 
                String(a.Cliente).toLowerCase() === cliente.toLowerCase()
            );

            if (meus.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Sem agendamentos ativos. 📅</p>";
                return;
            }

            container.innerHTML = meus.map(a => `
                <div class="pedido-card" style="border-left-color: #e8b4b8;">
                    <div class="status-badge pago">Confirmado</div>
                    <strong>📅 ${a.DataAgenda || a.Data} às ${a.Hour || a.Hora}</strong><br>
                    <p><strong>Serviço:</strong> ${a.Servico || 'Cuidado'}</p>
                    <small>Profissional: ${a.Profissional || 'Equipe'}</small>
                </div>
            `).join('');
        } catch (e) { container.innerHTML = "Erro ao carregar agenda."; }
    }
</script>

</body>
</html>
